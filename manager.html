<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Manager Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            background:#0f172a;

            color:white;

            overflow-x:hidden;
        }

        .dashboard{

            display:flex;

            min-height:100vh;
        }

        /* Sidebar */

        .sidebar{

            width:260px;

            background:rgba(15,23,42,0.95);

            backdrop-filter:blur(10px);

            padding:30px 20px;

            border-right:1px solid rgba(255,255,255,0.08);

            position:fixed;

            height:100vh;
        }

        .sidebar h2{

            font-size:28px;

            margin-bottom:40px;

            color:#60a5fa;

            text-align:center;
        }

        .sidebar ul{

            list-style:none;
        }

        .sidebar ul li{

            padding:15px;

            margin-bottom:15px;

            border-radius:12px;

            cursor:pointer;

            transition:0.3s;

            font-weight:500;
        }

        .sidebar ul li:hover{

            background:linear-gradient(
                135deg,
                #2563eb,
                #7c3aed
            );

            transform:translateX(6px);
        }

        /* Main Content */

        .content{

            margin-left:260px;

            width:100%;

            padding:35px;
        }

        .content h1{

            font-size:36px;

            margin-bottom:30px;

            font-weight:700;
        }

        /* Cards */

        .cards{

            display:grid;

            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

            gap:25px;

            margin-bottom:40px;
        }

        .card{

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            padding:30px;

            border-radius:20px;

            font-size:20px;

            font-weight:600;

            transition:0.4s;

            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .card:hover{

            transform:translateY(-8px);

            background:linear-gradient(
                135deg,
                rgba(37,99,235,0.3),
                rgba(124,58,237,0.3)
            );
        }

        /* Table */

        table{

            width:100%;

            border-collapse:collapse;

            background:rgba(255,255,255,0.05);

            backdrop-filter:blur(12px);

            border-radius:18px;

            overflow:hidden;

            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        table th{

            background:#1e293b;

            color:#93c5fd;

            padding:18px;

            text-align:left;

            font-size:16px;
        }

        table td{

            padding:18px;

            border-bottom:1px solid rgba(255,255,255,0.05);

            color:#e2e8f0;
        }

        table tr:hover{

            background:rgba(255,255,255,0.05);
        }

        /* Upload Button */

        .upload-btn{

            display:inline-block;

            margin-top:30px;

            text-decoration:none;

            padding:15px 25px;

            border-radius:14px;

            background:linear-gradient(
                135deg,
                #2563eb,
                #7c3aed
            );

            color:white;

            font-weight:600;

            transition:0.4s;
        }

        .upload-btn:hover{

            transform:translateY(-4px);

            box-shadow:0 8px 20px rgba(37,99,235,0.4);
        }

        /* Background Circles */

        .circle{

            position:fixed;

            border-radius:50%;

            background:rgba(255,255,255,0.05);

            animation:float 8s infinite ease-in-out;
        }

        .circle1{
            width:250px;
            height:250px;
            top:-80px;
            right:-50px;
        }

        .circle2{
            width:180px;
            height:180px;
            bottom:-50px;
            left:-40px;
            animation-delay:2s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

    </style>

</head>

<body>

    <!-- Animated Background -->

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="dashboard">

        <!-- Sidebar -->

        <div class="sidebar">

            <h2>Manager</h2>

            <ul>

                <li>Dashboard</li>

                <li>Projects</li>

                <li>Analytics</li>

                <li>Reports</li>

            </ul>

        </div>

        <!-- Main Content -->

        <div class="content">

            <h1>Project Overview</h1>

            <!-- Cards -->

            <div class="cards">

                <div class="card">
                    Total Projects: 12
                </div>

                <div class="card">
                    Completed: 8
                </div>

                <div class="card">
                    Pending: 4
                </div>

            </div>

            <!-- Table -->

            <table>

                <tr>

                    <th>Project</th>

                    <th>Status</th>

                    <th>Progress</th>

                </tr>

                {% for project in projects %}

                <tr>

                    <td>{{ project.name }}</td>

                    <td>{{ project.status }}</td>

                    <td>{{ project.progress }}%</td>

                </tr>

                {% endfor %}

            </table>

            <!-- Upload Button -->

            <a href="/upload"
               class="upload-btn">

                Upload Project Files

            </a>

        </div>

    </div>

</body>

</html>
