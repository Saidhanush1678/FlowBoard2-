<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Manager Login</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background-image:
            linear-gradient(
                rgba(15,23,42,0.85),
                rgba(15,23,42,0.95)
            ),
            url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=2071');

            background-size:cover;
            background-position:center;

            overflow:hidden;
        }

        .login-box{

            width:420px;

            padding:45px;

            border-radius:25px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(16px);

            border:1px solid rgba(255,255,255,0.2);

            box-shadow:0 8px 32px rgba(0,0,0,0.4);

            animation:fadeIn 1.2s ease;
        }

        .login-box h1{

            color:white;

            text-align:center;

            margin-bottom:35px;

            font-size:34px;

            font-weight:700;
        }

        .login-box form{

            display:flex;

            flex-direction:column;

            gap:22px;
        }

        .login-box input{

            padding:16px;

            border:none;

            outline:none;

            border-radius:12px;

            background:rgba(255,255,255,0.12);

            color:white;

            font-size:15px;

            transition:0.3s;
        }

        .login-box input::placeholder{

            color:#cbd5e1;
        }

        .login-box input:focus{

            background:rgba(255,255,255,0.18);

            border:1px solid #60a5fa;
        }

        .login-box button{

            padding:16px;

            border:none;

            border-radius:14px;

            background:linear-gradient(
                135deg,
                #2563eb,
                #7c3aed
            );

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:0.4s;
        }

        .login-box button:hover{

            transform:translateY(-4px);

            box-shadow:0 8px 20px rgba(37,99,235,0.5);
        }

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(255,255,255,0.08);

            animation:float 8s infinite ease-in-out;
        }

        .circle1{
            width:180px;
            height:180px;
            top:-50px;
            left:-40px;
        }

        .circle2{
            width:250px;
            height:250px;
            bottom:-80px;
            right:-70px;
            animation-delay:2s;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

    </style>

</head>

<body>

    <!-- Animated Background -->

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <!-- Login Box -->

    <div class="login-box">

        <h1>Manager Login</h1>

        <form action="/manager_dashboard">

            <input type="text"
                   placeholder="Manager Username"
                   required>

            <input type="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
