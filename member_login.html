<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Team Member Login</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

            background-image:
            linear-gradient(
                rgba(15,23,42,0.88),
                rgba(15,23,42,0.96)
            ),
            url('https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=2070');

            background-size:cover;

            background-position:center;
        }

        /* Login Box */

        .login-box{

            width:420px;

            padding:45px;

            border-radius:25px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(16px);

            border:1px solid rgba(255,255,255,0.15);

            box-shadow:0 8px 32px rgba(0,0,0,0.45);

            animation:fadeIn 1.2s ease;
        }

        .login-box h1{

            text-align:center;

            color:white;

            font-size:32px;

            margin-bottom:35px;

            font-weight:700;
        }

        form{

            display:flex;

            flex-direction:column;

            gap:22px;
        }

        input{

            padding:16px;

            border:none;

            outline:none;

            border-radius:14px;

            background:rgba(255,255,255,0.1);

            color:white;

            border:1px solid rgba(255,255,255,0.12);

            transition:0.3s;
        }

        input::placeholder{

            color:#cbd5e1;
        }

        input:focus{

            border:1px solid #60a5fa;

            background:rgba(255,255,255,0.15);
        }

        button{

            padding:16px;

            border:none;

            border-radius:14px;

            background:linear-gradient(
                135deg,
                #2563eb,
                #7c3aed
            );

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:0.4s;
        }

        button:hover{

            transform:translateY(-4px);

            box-shadow:0 8px 20px rgba(37,99,235,0.45);
        }

        /* Floating circles */

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(255,255,255,0.05);

            animation:float 8s infinite ease-in-out;
        }

        .circle1{
            width:200px;
            height:200px;
            top:-60px;
            left:-40px;
        }

        .circle2{
            width:250px;
            height:250px;
            bottom:-80px;
            right:-60px;
            animation-delay:2s;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

    </style>

</head>

<body>

    <!-- Background Animation -->

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <!-- Login Box -->

    <div class="login-box">

        <h1>Team Member Login</h1>

        <form action="/member_dashboard/akhil">

            <input type="text"
                   placeholder="Username"
                   required>

            <input type="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
